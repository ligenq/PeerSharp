name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PeerSharp.slnx

      - name: Build (warnings as errors)
        run: dotnet build PeerSharp.slnx --no-restore --configuration Release -warnaserror

      - name: Test
        run: dotnet test PeerSharp.slnx --no-build --configuration Release --logger "console;verbosity=minimal"
